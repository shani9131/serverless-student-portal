<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - Student System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-card {
            border-radius: 16px;
            transition: 0.3s;
            border: none;
        }
        .contact-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar">
        <h4 class="text-white text-center mt-4 fw-bold">
            <i class="bi bi-mortarboard-fill me-2"></i>
            Student System
        </h4>
        <ul class="nav flex-column mt-4">
            <li class="nav-item">
                <a class="nav-link" href="dashboard.html">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="students.html">
                    <i class="bi bi-people"></i> Students
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="notifications.html">
                    <i class="bi bi-bell"></i> Notifications
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="contacts.html">
                    <i class="bi bi-person-lines-fill"></i> Contacts
                </a>
            </li>
            <li class="nav-item mt-4 px-3">
                <button class="btn btn-danger w-100 rounded-pill" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
            </li>
        </ul>
    </div>

    <div class="main-content p-4 w-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Contacts</h2>
                <p class="text-muted mb-0">Manage important institutional contact information</p>
            </div>
            <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addContactModal">
                <i class="bi bi-plus-circle me-2"></i> Add Contact
            </button>
        </div>

        <div class="row g-4" id="contactsContainer"></div>
    </div>
</div>

<div class="modal fade" id="addContactModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0">
                <h5 class="fw-bold">
                    <i class="bi bi-person-lines-fill text-primary me-2"></i> Add Contact
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="contactName" class="form-control mb-3" placeholder="Contact Name">
                <input type="email" id="contactEmail" class="form-control mb-3" placeholder="Email Address">
                <input type="text" id="contactPhone" class="form-control" placeholder="Phone Number">
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary rounded-pill px-4" onclick="addContact()">Save Contact</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/contacts.js"></script>
</body>
</html>
