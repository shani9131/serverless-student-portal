<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students - Student System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar p-3">

<h4 class="text-white text-center mb-4">🎓 SIS</h4>

<ul class="nav flex-column">

<li class="nav-item">
<a class="nav-link" href="dashboard.html">
<i class="bi bi-speedometer2"></i> Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="students.html">
<i class="bi bi-people"></i> Students
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="notifications.html">
<i class="bi bi-bell"></i> Notifications
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="contacts.html">
<i class="bi bi-person-lines-fill"></i> Contacts
</a>
</li>

<li class="nav-item mt-4">
<button class="btn btn-light w-100 fw-bold" onclick="logout()">
<i class="bi bi-box-arrow-right"></i> Logout
</button>
</li>

</ul>

</div>


<!-- MAIN CONTENT -->
<div class="main-content p-4 w-100">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Students</h2>

    <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#addStudentModal">
        <i class="bi bi-plus-lg"></i> Add Student
    </button>
</div>

<!-- SEARCH -->
<div class="card modern-card p-3 mb-4">
    <input 
        type="text" 
        id="searchInput" 
        class="form-control search-input" 
        placeholder="🔍 Search students..."
        onkeyup="searchStudents()"
    >
</div>

<!-- TABLE -->
<div class="card modern-card p-3">

<div class="table-responsive">
<table class="table align-middle">

<thead class="table-light">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Semester</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>
</div>

</div>

</div>

</div>


<!-- ADD STUDENT MODAL -->
<div class="modal fade" id="addStudentModal">
  <div class="modal-dialog">
    <div class="modal-content modern-card">

      <div class="modal-header">
        <h5 class="fw-bold">Add Student</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="studentId" class="form-control mb-3" placeholder="Student ID">
        <input type="text" id="name" class="form-control mb-3" placeholder="Name">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <input type="text" id="course" class="form-control mb-3" placeholder="Course">
        <input type="text" id="semester" class="form-control mb-3" placeholder="Semester">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary w-100" onclick="addStudent()">Save Student</button>
      </div>

    </div>
  </div>
</div>


<!-- EDIT STUDENT MODAL -->
<div class="modal fade" id="editStudentModal">
  <div class="modal-dialog">
    <div class="modal-content modern-card">

      <div class="modal-header">
        <h5 class="fw-bold">Edit Student</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="editStudentId" class="form-control mb-3" readonly>
        <input type="text" id="editName" class="form-control mb-3">
        <input type="email" id="editEmail" class="form-control mb-3">
        <input type="text" id="editCourse" class="form-control mb-3">
        <input type="text" id="editSemester" class="form-control mb-3">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary w-100" onclick="updateStudent()">Update Student</button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="manageStudentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-person-gear me-2"></i>Manage Student: <span id="manageStudentName" class="fw-bold"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <input type="hidden" id="manageStudentId">

                <ul class="nav nav-tabs nav-fill bg-light pt-2" id="manageTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold" id="subject-tab" data-bs-toggle="tab" data-bs-target="#subject-pane" type="button" role="tab">📚 Add Subject</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold" id="attendance-tab" data-bs-toggle="tab" data-bs-target="#attendance-pane" type="button" role="tab">✅ Update Attendance</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold" id="fee-tab" data-bs-toggle="tab" data-bs-target="#fee-pane" type="button" role="tab">💳 Generate Fee</button>
                    </li>
                </ul>

                <div class="tab-content p-4" id="manageTabsContent">
                    <div class="tab-pane fade show active" id="subject-pane" role="tabpanel">
                        <form id="addSubjectForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Subject Name</label>
                                    <input type="text" id="subjectName" class="form-control" placeholder="e.g. Machine Learning" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Faculty Name</label>
                                    <input type="text" id="facultyName" class="form-control" placeholder="e.g. Dr. Andrew" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100 fw-bold">Assign Subject</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="attendance-pane" role="tabpanel">
                        <form id="updateAttendanceForm">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Overall Attendance Percentage (%)</label>
                                    <input type="number" id="attendancePercent" class="form-control form-control-lg text-center" min="0" max="100" placeholder="85" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-success w-100 fw-bold">Save Attendance</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="fee-pane" role="tabpanel">
                        <form id="addFeeForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Fee Description</label>
                                    <input type="text" id="feeDesc" class="form-control" placeholder="e.g. Library Fine" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Amount (₹)</label>
                                    <input type="number" id="feeAmount" class="form-control" placeholder="500" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Status</label>
                                    <select id="feeStatus" class="form-select" required>
                                        <option value="Pending">Pending</option>
                                        <option value="Paid">Paid</option>
                                    </select>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-danger w-100 fw-bold">Generate Invoice</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/students.js"></script>

</body>

</html>
