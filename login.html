<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid login-container">
    <div class="row vh-100">
        <div class="col-md-6 login-left d-flex flex-column justify-content-center align-items-center text-white">
            <h1 class="mb-3 fw-bold">Welcome Back</h1>
            <p class="text-center">
                Student Information System<br>
                Cloud Computing Project
            </p>
            <i class="bi bi-mortarboard-fill display-1 mt-2"></i>
        </div>

        <div class="col-md-6 d-flex justify-content-center align-items-center">
            <div class="card login-card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 420px;">
                <div class="card-body p-4">
                    <h3 class="text-center fw-bold mb-4">Sign In</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" id="email" class="form-control p-2.5" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Password</label>
                            <input type="password" id="password" class="form-control p-2.5" placeholder="Enter security password" required>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-6">
                                <button type="button" id="studentBtn" class="btn btn-primary w-100 fw-bold py-2">
                                    👨‍🎓 Student
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" id="staffBtn" class="btn btn-dark w-100 fw-bold py-2">
                                    👨‍🏫 Staff
                                </button>
                            </div>
                        </div>

                        <div id="roleError" class="alert alert-danger mt-3 text-center py-2" style="display: none; font-size: 0.9rem; font-weight: 500;"></div>
                    </form>
                    
                    <p class="text-center mt-4 mb-0 text-muted small">
                        <i class="bi bi-shield-lock-fill me-1"></i> Secure Portal Access
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
